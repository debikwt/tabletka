<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Таблетка</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f0f8ff; }
    h1 { text-align: center; color: #2c7a7b; }
    input, select, button { padding: 10px; margin: 5px 0; width: 100%; max-width: 400px; }
    button { background: #2c7a7b; color: white; border: none; cursor: pointer; }
    button:hover { background: #234f50; }
    .card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .taken { text-decoration: line-through; color: gray; }
  </style>
</head>
<body>
  <h1>💊 Таблетка</h1>

  <div class="card">
    <h3>Добавить болезнь</h3>
    <input type="text" id="disease" placeholder="Название болезни (например: Гипертония)">
    <button onclick="addDisease()">Добавить болезнь</button>
  </div>

  <div class="card">
    <h3>Добавить лекарство</h3>
    <select id="diseaseSelect"></select><br>
    <input type="text" id="pillName" placeholder="Название таблетки">
    <input type="text" id="dosage" placeholder="Дозировка (например: 1 таблетка)">
    <input type="time" id="time" value="08:00">
    <button onclick="addPill()">Добавить лекарство</button>
  </div>

  <div class="card">
    <h3>Сегодня нужно принять</h3>
    <div id="todayList"></div>
  </div>

  <div class="card">
    <h3>Все лекарства</h3>
    <div id="allPills"></div>
  </div>

  <script>
    let data = JSON.parse(localStorage.getItem('tabletka')) || { diseases: [], pills: [] };

    function saveData() {
      localStorage.setItem('tabletka', JSON.stringify(data));
      render();
    }

    function addDisease() {
      const name = document.getElementById('disease').value.trim();
      if (!name) return alert('Введите название болезни');
      data.diseases.push({ id: Date.now(), name });
      saveData();
      document.getElementById('disease').value = '';
    }

    function addPill() {
      const diseaseId = parseInt(document.getElementById('diseaseSelect').value);
      const name = document.getElementById('pillName').value.trim();
      const dosage = document.getElementById('dosage').value.trim();
      const time = document.getElementById('time').value;

      if (!name  !dosage  !time) return alert('Заполните все поля');

      data.pills.push({
        id: Date.now(),
        diseaseId,
        name,
        dosage,
        time,
        takenToday: false
      });
      saveData();
      document.getElementById('pillName').value = '';
      document.getElementById('dosage').value = '';
    }

    function render() {
      // Обновляем список болезней
      const select = document.getElementById('diseaseSelect');
      select.innerHTML = '<option value="">Выберите болезнь</option>';
      data.diseases.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = d.name;
        select.appendChild(opt);
      });

      // Сегодняшние приёмы
      const todayList = document.getElementById('todayList');
      todayList.innerHTML = '';
      const now = new Date();
      const currentTime = now.toTimeString().slice(0,5);

      data.pills.forEach((pill, index) => {
        const disease = data.diseases.find(d => d.id === pill.diseaseId);
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <strong>${pill.time}</strong> — ${pill.name} (${pill.dosage})<br>
          <small>${disease ? disease.name : 'Без болезни'}</small>
          <button onclick="markTaken(${index})" ${pill.takenToday ? 'disabled' : ''}>
            ${pill.takenToday ? 'Принято ✓' : 'Принял'}
          </button>
        `;
        todayList.appendChild(div);

        // Проверка времени и уведомление
        if (pill.time === currentTime && !pill.takenToday) {
          notify(pill);
        }
      });

      // Все лекарства
      const allPills = document.getElementById('allPills');
      allPills.innerHTML = '';
      data.pills.forEach((pill, i) => {
        const d = data.diseases.find(dis => dis.id === pill.diseaseId);
        const el = document.createElement('div');
        el.className = 'card';
        el.innerHTML = ${pill.time} | ${pill.name} — ${pill.dosage} <small>(${d ? d.name : ''})</small>;
        allPills.appendChild(el);
      });
    }

    function markTaken(index) {
      data.pills[index].takenToday = true;
      saveData();
    }

    function notify(pill) {
      if (Notification.permission === "granted") {
        const disease = data.diseases.find(d => d.id === pill.diseaseId);
        new Notification("⏰ Время пить таблетки!", {
          body: ${pill.name} — ${pill.dosage}\n${disease ? disease.name : ''},
          icon: "https://img.icons8.com/fluency/96/pill.png"
        });
        playMelody();
      } else if (Notification.permission !== "denied") {
        Notification.requestPermission();
      }
    }

    function playMelody() {
      const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
      audio.volume = 0.6;
      audio.play();
      setTimeout(() => audio.pause(), 15000); // 15 секунд мелодии
    }

    // Запуск каждую минуту
    setInterval(render, 60000);
    render();

    // Запрос разрешения на уведомления
    if (Notification.permission === "default") {
      Notification.requestPermission();
    }
  </script>
</body>
</html>
